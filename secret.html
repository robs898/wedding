<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Required</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login {
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login .icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .login h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .login p {
      font-size: 13px;
      color: #8888a0;
      margin-bottom: 28px;
    }

    .card {
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 24px;
    }

    .field {
      margin-bottom: 14px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #8888a0;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: #1c1c28;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #e8e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .error {
      margin-top: 14px;
      font-size: 13px;
      color: #f87171;
      min-height: 20px;
    }

    .login.hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- Login form -->
  <div class="login" id="login">
    <div class="icon">🔒</div>
    <h1>Access Required</h1>
    <p>Enter your credentials to unlock this page.</p>
    <div class="card">
      <div class="field">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" placeholder="Username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="Password">
      </div>
      <button class="submit-btn" id="loginBtn">Unlock</button>
      <div class="error" id="error"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // PASTE YOUR ENCRYPTED PAYLOAD FROM encrypt-tool.html HERE
    // ═══════════════════════════════════════════════════════
    const ENCRYPTED_PAYLOAD = 'EmKTKSSaRrhbVHnZHQjg/g==.6S1yhBQachTAM7KC.uXMAjveYoe6w/ng8sDT43s24+UKaOpBh8IyiW5Lr';
    // ═══════════════════════════════════════════════════════

    function fromBase64(str) {
      return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    }

    async function deriveKey(credentials, salt) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(credentials), 'PBKDF2', false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-512' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    async function attempt() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const error = document.getElementById('error');

      if (!user || !pass) { error.textContent = 'Please enter both fields.'; return; }

      try {
        const [saltB64, ivB64, cipherB64] = ENCRYPTED_PAYLOAD.split('.');
        const salt = fromBase64(saltB64);
        const iv = fromBase64(ivB64);
        const ciphertext = fromBase64(cipherB64);

        const key = await deriveKey(user + ':' + pass, salt);
        const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
        const html = new TextDecoder().decode(decrypted);

        // Success — replace the entire page with the decrypted HTML
        document.getElementById('login').classList.add('hidden');
        document.open();
        document.write(html);
        document.close();

      } catch {
        error.textContent = 'Invalid credentials.';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }

    document.getElementById('loginBtn').addEventListener('click', attempt);
    document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
    document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });
  </script>
</body>

</html>
