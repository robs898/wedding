<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wedding Invitation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap');
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      height: 100%;
      background: #0a0a0a;
      color: #f5f0e8;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .login-container {
      max-width: 400px;
      padding: 40px 20px;
      animation: fadeIn 1s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 2.5rem;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .input-wrapper {
      position: relative;
      margin: 0 auto;
      width: 240px;
    }

    #k {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #f5f0e8;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      padding: 10px 0;
      width: 100%;
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      transition: border-color 0.3s;
    }

    #k::placeholder {
      color: rgba(255, 255, 255, 0.15);
      letter-spacing: 1px;
    }

    #k:focus {
      border-bottom-color: #f5f0e8;
    }

    #k.e {
      border-bottom-color: rgba(180, 40, 40, 0.8);
      animation: shake 0.4s;
    }

    .hint {
      display: block;
      margin-top: 16px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>You're Invited</h1>
    <p>Please enter the secret passphrase included in your formal invitation to access the wedding details.</p>
    
    <div class="input-wrapper">
      <input type="password" id="k" autocomplete="off" spellcheck="false" autofocus placeholder="Passphrase">
      <span class="hint">Press Enter to unlock</span>
    </div>
  </div>

    function b(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)) }
    document.getElementById('k').addEventListener('keydown', async function (e) {
      if (e.key !== 'Enter') return;
      const v = e.target.value; if (!v) return;
      try {
        const p = E.split('.');
        const salt = b(p[0]), iv = b(p[1]), ct = b(p[2]);
        const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(v), 'PBKDF2', false, ['deriveKey']);
        const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: salt, iterations: 600000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
        const d = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ct);
        document.open(); document.write(new TextDecoder().decode(d)); document.close();
      } catch (err) {
        e.target.value = ''; e.target.classList.add('e');
        setTimeout(function () { e.target.classList.remove('e') }, 400);
      }
    });
